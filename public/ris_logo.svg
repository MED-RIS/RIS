<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Color Gradients matching the RIS System Theme -->
  <defs>
    <linearGradient id="risPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4afef0" />   <!-- common.main (Bright Teal) -->
      <stop offset="50%" stop-color="#6de8bd" />  <!-- secondary.light (Mint Green) -->
      <stop offset="100%" stop-color="#066952" /> <!-- primary.main (Emerald Green) -->
    </linearGradient>
    <linearGradient id="risGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4afef0" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#066952" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Ambient Glow Behind the Symbol -->
  <circle cx="48" cy="50" r="32" fill="url(#risGlow)" filter="blur(8px)" />

  <!-- CT/MRI Scanner Ring (Minimalist broken-dash pattern) -->
  <circle cx="48" cy="50" r="41" stroke="url(#risPrimary)" stroke-width="1.5" stroke-opacity="0.15" />
  <circle cx="48" cy="50" r="41" stroke="url(#risPrimary)" stroke-width="2.5" stroke-dasharray="25 45 15 35 30 50" stroke-linecap="round" />
  
  <!-- Stylized Geometric "R" Symbol -->
  <!-- Spine -->
  <path d="M38 30 V70" stroke="url(#risPrimary)" stroke-width="6.5" stroke-linecap="round" />
  <!-- Loop -->
  <path d="M38 33 C48 33, 58 35, 58 42 C58 49, 48 51, 38 51" stroke="url(#risPrimary)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Leg -->
  <path d="M44 51 C50 51, 54 61, 58 70" stroke="url(#risPrimary)" stroke-width="6.5" stroke-linecap="round" />

  <!-- Radiology Diagnostic Scan Waves (Fading outwards) -->
  <path d="M68 36 A 22 22 0 0 1 68 64" stroke="#4afef0" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85" />
  <path d="M75 29 A 31 31 0 0 1 75 71" stroke="#6de8bd" stroke-width="3" stroke-linecap="round" stroke-opacity="0.55" />
  <path d="M82 22 A 40 40 0 0 1 82 78" stroke="#066952" stroke-width="3" stroke-linecap="round" stroke-opacity="0.25" />
</svg>
